<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
    

<div class="campo">
    <h1 id="título">Cadastro de Pessoa Física</h1>
    <p id="subtitulo">Complete suas informações</p>
    <br>
</div >

<form>
    <fieldset class="grupo">
        <div class="campo">
            <label>Nome</label>
            <input type="text" name="nome" id="nome">
        </div> 

        <div class="campo">
            <label>Sobrenome</label>
            <input type="text" name="sobrenome" id="sobrenome">
        </div>
    </fieldset>

    <div class="campo">
        <label>Email</label>
        <input type="email" name="email" id="email">
    </div>

    <div class="campo">
        <label>Em qual situação você escolheu sua profissão</label>
        <label>
            <input type="radio" name="devweb" value="Frontend" checked>Front-end
        </label>
        <label>
            <input type="radio" name="devweb" value="backend">Back-end
        </label>
        <label>
            <input type="radio" name="devweb" value="fullstack">Fullstack
        </label>
    </div>

    <div class="campo">
        <label>Senioridade</label>
        <select id="senioridade">
        <option select disabled value="">Selecione</option>
            <option>Junior</option>
            <option>Pleno</option>
            <option>Senior</option>
        </select>
    </div>

     <fieldset class="grupo">
        <div id="check">
            <label>Selecione as tecnologias que utiliza</label><br><br>
            <input type="checkbox" id="tecnologia1" name="tecnologia1" value="HTML">
            <label for="tecnologia1"HTML></label>
            <input type="checkbox" id="tecnologia2" name="tecnologia2" value="CSS">
            <label for="tecnologia2">CSS</label>
            <input type="checkbox" id="tecnologia3" name="tecnologia3" value="JavaScript">
            <label for="tecnologia3">JavaScript</label>
            <input type="checkbox" id="tecnologia4" name="tecnologia4" value="PHP">
            <label for="tecnologia4">PHP</label>
            <input type="checkbox" id="tecnologia5" name="tecnologia5" value="C#">
            <label for="tecnologia5">C#</label>
            <input type="checkbox" id="tecnologia6" name="tecnologia5" value="Python">
            <label for="tecnologia6">Python</label>
            <input type="checkbox" id="tecnologia7" name="tecnologia7" value="Java">
            <label for="Tecnologia7">Java</label>
        </div>
     </fieldset>

     <div class="campo">
        <br>
        <label>Conte um pouco da sua experiência</label>
        <textarea row="6" style="width: 26em" id="experiencia"></textarea>
     </div>

     <button  type="submit">concluido</button>

</form>

</body>
</html>
